version: '3.8'

services:
  buraco-server:
    build:
      context: .
      dockerfile: buraco-server/Dockerfile
      args:
        SERVER_PORT: ${SERVER_PORT:-8000}
    environment:
      - SERVER_PORT=${SERVER_PORT:-8000}
    ports:
      - "${SERVER_PORT:-8000}:${SERVER_PORT:-8000}"
    volumes:
      - ./buraco-server/db:/app/db
      - ./buraco-server/bots:/app/bots
    restart: unless-stopped
    develop:
      watch:
        - action: rebuild
          path: ./buraco-server/package.json
        - action: sync+restart
          path: ./buraco-server
          target: /app
          ignore:
            - node_modules/
            - db/
            - bots/
        - action: sync+restart
          path: ./buraco-client/src/game.js
          target: /app/game.js

  buraco-bot:
    build:
      context: .
      dockerfile: buraco-server/Dockerfile
    command: ["node", "bot.js"]
    depends_on:
      - buraco-server
    restart: unless-stopped
    develop:
      watch:
        - action: rebuild
          path: ./buraco-server/package.json
        - action: sync+restart
          path: ./buraco-server
          target: /app
          ignore:
            - node_modules/
            - db/
            - bots/
        - action: sync+restart
          path: ./buraco-client/src/game.js
          target: /app/game.js

  buraco-client:
    build:
      context: ./buraco-client
      args:
        CLIENT_PORT: ${CLIENT_PORT:-5173}
    environment:
      - CLIENT_PORT=${CLIENT_PORT:-5173}
      - SERVER_PORT=${SERVER_PORT:-8000}
    ports:
      - "${CLIENT_HOST_PORT:-5173}:${CLIENT_PORT:-5173}"
    depends_on:
      - buraco-server
    restart: unless-stopped
    develop:
      watch:
        - action: rebuild
          path: ./buraco-client/package.json
        - action: sync
          path: ./buraco-client/src
          target: /app/src
          ignore:
            - node_modules/
