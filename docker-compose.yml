version: '3.8'

services:
  buraco-server:
    build: ./buraco-server
    container_name: buraco-server
    ports:
      - "8000:8000"
    volumes:
      # This saves your database permanently to the host machine
      - ./buraco-server/db:/app/db
    restart: unless-stopped

  buraco-client:
    build: ./buraco-client
    container_name: buraco-client
    ports:
      - "4173:4173"
    depends_on:
      - buraco-server
    restart: unless-stopped
